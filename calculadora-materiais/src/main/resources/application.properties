spring.application.name=calculadora-materiais

# H2 em arquivo para manter os orcamentos entre execucoes.
spring.datasource.url=jdbc:h2:file:./data/calculadora_materiais;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

server.port=8080

# Configuracao do Jakarta Faces via JoinFaces.
joinfaces.faces.project-stage=development
server.servlet.context-parameters.jakarta.faces.PROJECT_STAGE=Development
